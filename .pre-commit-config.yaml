# pre-commit 配置模板
# 来源: https://github.com/pre-commit/pre-commit-hooks
# 和 https://github.com/astral-sh/ruff-pre-commit
# 
# 使用说明:
#   1. 复制此文件到项目根目录: .pre-commit-config.yaml
#   2. 运行: pre-commit install
#   3. 运行: pre-commit run --all-files  (首次全量检查)
#
# 所有钩子由社区维护，无需自己编写代码

repos:
  # ========== 基础钩子 (pre-commit/pre-commit-hooks) ==========
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # 阻止大文件提交
      - id: check-added-large-files
        args: ['--maxkb=500']
      
      # 防止提交私有密钥
      - id: detect-private-key
      
      # 检查 YAML 语法
      - id: check-yaml
        exclude: '^k8s/.*'  # k8s 模板可能不标准
      
      # 确保文件以换行符结束
      - id: end-of-file-fixer
      
      # 移除尾随空格
      - id: trailing-whitespace
        exclude: '\.(md|txt)$'  # 某些文本文件需要尾随空格
      
      # 检查 JSON 语法
      - id: check-json
      
      # 检查 TOML 语法
      - id: check-toml
      
      # 检查合并冲突标记
      - id: check-merge-conflict
      
      # 检查文件是否可执行 (不应该)
      - id: check-executables-have-shebangs
        exclude: '^scripts/.*\.sh$'  # shell脚本应该有

  # ========== 代码格式化 (Ruff -  fastest Python linter) ==========
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.4
    hooks:
      # 自动修复 lint 错误
      - id: ruff
        args: [--fix]
        files: \.(py|pyi|pyx)$
        # 排除测试文件 (可选)
        exclude: '^tests/'
      
      # 代码格式化 (black-like)
      - id: ruff-format
        files: \.(py|pyi|pyx)$

  # ========== JavaScript/TypeScript ==========
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.12.0
    hooks:
      - id: eslint
        files: \.[jt]sx?$
        additional_dependencies:
          - eslint@^9
          - typescript@^5
          - '@typescript-eslint/parser@^7'
          - '@typescript-eslint/eslint-plugin@^7'
          - eslint-plugin-react@^7
          - eslint-plugin-react-hooks@^4
        # 尝试自动修复
        args: [--fix]

  # ========== 代码格式化 (Prettier) ==========
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        additional_dependencies:
          - prettier@^3
          - prettier-plugin-tailwindcss  # 如果使用 Tailwind
          - prettier-plugin-markdown  # Markdown 格式化
        exclude: '^(package\.json|package-lock\.json|pnpm-lock\.yaml|bun\.lockb)$'

  # ========== Shell 脚本检查 ==========
  - repo: https://github.com/openstack/bashate
    rev: 2.1.0
    hooks:
      - id: bashate
        args: [--ignore=E006,E007]  # 某些规则可忽略
        files: '\.sh$'
        exclude: '^\./scripts/.*'  # 某些脚本可能有意不标准

  # ========== 安全检查 ==========
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        # exclude: 某些文件可能包含测试密钥
        exclude: '^(tests/.*test.*|.*\.test\..*)$'

  # ========== Markdown 检查 ==========
  - repo: https://github.com/pre-commit/mirrors-markdownlint
    rev: v0.12.0
    hooks:
      - id: markdownlint
        args: [--ignore, 'CHANGELOG.md']
        exclude: '^(LICENSE|README)\.md$'

  # ========== 依赖安全检查 (可选) ==========
  - repo: https://github.com/pycqa/bandit
    rev: 1.8.2
    hooks:
      - id: bandit
        args: [-r, --severity-level=high]
        files: \.py$
        exclude: '^(tests|.*_test\.py)$'

  # ========== 提交信息规范 (可选) ==========
  - repo: https://github.com/conventional-commits/conventional-commits
    rev: v1.0.0
    hooks:
      - id: validate-conventional-commit
        # 只在 commit 消息上检查
        stages: [commit-msg]

# ========== 本地自定义钩子 (使用已验证的框架) ==========
# 如果需要自定义逻辑，使用 pre-commit 的 local 钩子
# 但逻辑要尽可能简单，或调用已有工具

# 示例: 确保没有 TODO 注释 (简单grep，已验证)
  - repo: local
    hooks:
      - id: no-todos
        name: "禁止提交未完成的 TODO"
        entry: bash -c 'git diff --cached --name-only | xargs grep -n "TODO" && exit 1 || exit 0'
        language: system
        stages: [commit]
        # 注意: 这可能误报，谨慎使用

# ========== CI 阶段 (push 时更严格) ==========
# 在 .pre-commit-config.yaml 中可以设置不同阶段
# 本地开发用 commit 阶段 (快速)
# CI 用 push 阶段 (完整)

ci:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.4
    hooks:
      - id: ruff
        # push 阶段运行全部检查，不自动修复
        args: [--format=github]
        stages: [push]
