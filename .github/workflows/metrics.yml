name: Metrics

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  introduction:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: thedavidweng
          template: classic
          filename: github-metrics-introduction.svg
          output_action: commit
          committer_branch: main
          config_timezone: America/Vancouver
          base: false
          plugins_errors_fatal: false
          config_display: "🕐💻📊"
          config_animations: no
          extras_css: |
            :root {
              --color-bg: #0d1117;
              --color-text: #c9d1d9;
              --color-subtext: #8b949e;
              --color-border: #30363d;
            }
            svg { color-scheme: dark; }
          plugin_introduction: yes
          plugin_introduction_title: no

  habits:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: thedavidweng
          template: classic
          filename: github-metrics-habits.svg
          output_action: commit
          committer_branch: main
          config_timezone: America/Vancouver
          base: false
          plugins_errors_fatal: false
          config_display: "🕐💻📊"
          config_animations: no
          extras_css: |
            :root {
              --color-bg: #0d1117;
              --color-text: #c9d1d9;
              --color-subtext: #8b949e;
              --color-border: #30363d;
            }
            svg { color-scheme: dark; }
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 30
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: graph
          plugin_habits_languages_limit: 6
