name: Metrics

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  introduction:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ github.token }}
          user: thedavidweng
          template: classic
          filename: github-metrics-introduction.svg
          output_action: commit
          committer_branch: master
          config_timezone: America/Vancouver
          base: false
          plugins_errors_fatal: false
          config_display: "🕐💻📊"
          config_animations: no
          extras_css: |
            :root {
              --color-bg: #0d1117;
              --color-text: #c9d1d9;
              --color-subtext: #8b949e;
              --color-border: #30363d;
            }
            svg { color-scheme: dark; }
          plugin_introduction: yes
          plugin_introduction_title: no

  languages:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ github.token }}
          user: thedavidweng
          template: classic
          filename: github-metrics-languages.svg
          output_action: commit
          committer_branch: master
          config_timezone: America/Vancouver
          base: false
          plugins_errors_fatal: false
          config_display: "🕐💻📊"
          config_animations: no
          extras_css: |
            :root {
              --color-bg: #0d1117;
              --color-text: #c9d1d9;
              --color-subtext: #8b949e;
              --color-border: #30363d;
            }
            svg { color-scheme: dark; }
          plugin_languages: yes
          plugin_languages_ignored: html,css
          plugin_languages_limit: 8
          plugin_languages_details: bytes-size
          plugin_languages_analysis_timeout: 30
