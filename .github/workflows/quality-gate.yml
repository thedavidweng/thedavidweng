name: Quality Gate

on:
  pull_request:
    branches: [main, master, develop]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main, master, develop]

permissions:
  contents: read
  actions: read
  checks: write
  security-events: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Lint
        run: |
          if npm run | grep -q "lint"; then
            npm run lint --if-present
          else
            echo "No lint script found"
          fi
        continue-on-error: true

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Test
        run: |
          if npm run | grep -q "test"; then
            npm test -- --coverage --ci --reporters=default --reporters=jest-junit
          else
            echo "No test script found"
          fi
        env:
          CI: true

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=moderate || true
        continue-on-error: true

  complexity:
    name: Complexity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Check complexity
        run: |
          if npx --yes plato --help > /dev/null 2>&1; then
            npx plato . -r reports/complexity -l
          else
            echo "Plato not available, skipping"
          fi
        continue-on-error: true
