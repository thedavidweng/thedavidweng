name: Quality Gate
# 来源: GitHub Actions 官方最佳实践
# 参考: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

on:
  pull_request:
    branches: [main, master, develop]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main, master, develop]
    # push 到这些分支时也运行

permissions:
  contents: read
  actions: read
  checks: write  # 允许提交 check runs
  security-events: write  # 允许提交 safety alerts

jobs:
  # ========== 1. 代码质量检查 ==========
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史用于 lint

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci  # 使用 lock file，确保一致性

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Run linters
        run: |
          # 使用项目已有的 lint 脚本
          if npm run | grep -q "lint"; then
            npm run lint --if-present
          else
            echo "No lint script found"
          fi
        # 收集 lint 报告
        continue-on-error: true

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: |
            reports/lint.json
            reports/eslint.txt
            .eslintcache
          retention-days: 7

  # ========== 2. 测试覆盖率 ==========
  test:
    name: Test
    needs: lint  # 依赖 lint 完成
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci  # 使用 lock file，确保一致性

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Run tests
        run: |
          # 使用项目已有的测试脚本
          if npm run | grep -q "test"; then
            npm test -- --coverage --ci --reporters=default --reporters=jest-junit
          else
            echo "No test script found"
          fi
        env:
          CI: true  # 强制 CI 模式

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: env.CODECOV_TOKEN != ''
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          verbose: true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage/
            junit.xml
            jest-junit.xml
          retention-days: 30

      - name: Test summary
        if: always()
        run: |
          echo "=== Test Summary ==="
          if [ -f "junit.xml" ]; then
            echo "JUnit report generated"
          fi
          if [ -d "coverage" ]; then
            echo "Coverage report generated"
          fi

  # ========== 3. 安全扫描 ==========
  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: |
          # 使用 npm 内置的安全扫描
          npm audit --audit-level=moderate || true  # 不阻止 build，只报告
        continue-on-error: true

      - name: Run Snyk (if configured)
        uses: snyk/actions/node@master
        if: env.SNYK_TOKEN != ''
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: |
            npm-audit.json
            snyk.sarif
          retention-days: 30

  # ========== 4. 复杂度检查 ==========
  complexity:
    name: Complexity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Check complexity
        run: |
          # 使用 plato 或其他复杂度工具
          if npx --yes plato --help > /dev/null 2>&1; then
            npx plato . -r reports/complexity -l
          else
            echo "Plato not available, skipping complexity check"
          fi
        continue-on-error: true

      - name: Upload complexity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: complexity-report
          path: reports/complexity/
          retention-days: 30

  # ========== 5. 质量汇总 ==========
  summary:
    name: Quality Summary
    needs: [lint, test, security, complexity]
    runs-on: ubuntu-latest
    if: always()  # 即使前面有失败也运行
    steps:
      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Generate summary
        run: |
          echo "# Quality Gate Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # 检查各job状态
          if [ "${{ needs.lint.result }}" == "success" ]; then
            echo "✅ **Lint**: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Lint**: Failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.test.result }}" == "success" ]; then
            echo "✅ **Tests**: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Tests**: Failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "All reports uploaded as artifacts. Check 'Artifacts' tab." >> $GITHUB_STEP_SUMMARY

      - name: Create check run
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: check } = await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'quality-gate',
              head_sha: context.sha,
              details_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              status: 'completed',
              conclusion: ${{ needs.lint.result == 'success' && needs.test.result == 'success' ? 'success' : 'failure' }},
              output: {
                title: 'Quality Gate',
                summary: 'All quality checks passed'
              }
            })

  # ========== 6. 自动合并 (可选，谨慎使用) ==========
  # 如果所有检查通过且 PR 有 "automerge" 标签，自动合并
  auto-merge:
    name: Auto Merge
    needs: [lint, test, security, complexity, summary]
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' &&
      needs.lint.result == 'success' &&
      needs.test.result == 'success' &&
      contains(github.event.pull_request.labels.*.name, 'automerge')
    steps:
      - name: Merge PR
        uses: peter-evans/merge-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          merge-method: squash
          commit-message: |
            chore: merge PR #{{
              github.event.pull_request.number
            }}
            
            - Auto-merged by Quality Gate workflow
            - All checks passed
